<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Little Timmy — Operator</title>
<style>
  html, body { height: 100%; margin: 0; background: #0d0d12; color: #ddd;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  header { padding: 12px 16px; border-bottom: 1px solid #222; display: flex;
    align-items: center; gap: 16px; }
  header h1 { font-size: 14px; margin: 0; letter-spacing: .15em; font-weight: 500; }
  header .nav a { color: #6cf; text-decoration: none; font-size: 12px; margin-right: 12px; }
  header .pill { font: 11px ui-monospace, monospace; padding: 2px 8px; border-radius: 8px;
    background: #1a1a22; border: 1px solid #333; }
  header .pill.up { color: #6f6; border-color: #2a4a2a; }
  header .pill.down { color: #f66; border-color: #4a2a2a; }
  #log { padding: 8px 16px; font: 11px/1.4 ui-monospace, "SF Mono", Consolas, monospace; }
  .ev { white-space: pre-wrap; padding: 1px 0; border-bottom: 1px solid #1a1a22; }
  .ev .t { color: #666; }
  .ev .k { color: #6cf; min-width: 110px; display: inline-block; }
</style>
</head>
<body>
<header>
  <h1>OPERATOR · placeholder</h1>
  <div class="nav"><a href="/visitor">visitor</a><a href="/health">health</a></div>
  <span id="lt-pill" class="pill">lt_ws ?</span>
  <span id="pi-pill" class="pill">streamerpi ?</span>
  <span id="evcount" class="pill">events 0</span>
</header>
<div id="log"></div>
<script>
  const logEl = document.getElementById("log");
  const ltPill = document.getElementById("lt-pill");
  const piPill = document.getElementById("pi-pill");
  const evCount = document.getElementById("evcount");
  let count = 0;
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    count++;
    evCount.textContent = `events ${count}`;
    if (m.type === "snapshot") {
      setPill(ltPill, "lt_ws", m.lt_ws_up);
      setPill(piPill, "streamerpi", m.streamerpi_up);
    }
    append(m.type, JSON.stringify(m).slice(0, 320));
  };
  function setPill(el, label, up) {
    el.textContent = `${label} ${up ? "up" : "down"}`;
    el.className = "pill " + (up ? "up" : "down");
  }
  function append(kind, body) {
    const div = document.createElement("div");
    div.className = "ev";
    const t = new Date().toLocaleTimeString();
    div.innerHTML = `<span class="t">${t}</span> <span class="k">${kind}</span> ${body}`;
    logEl.prepend(div);
    while (logEl.children.length > 400) logEl.removeChild(logEl.lastChild);
  }
</script>
</body>
</html>
