<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Little Timmy — Visitor</title>
<style>
  :root {
    --bg: #07080a;
    --fg: #d8d8da;
    --dim: #5f6470;
    --rule: #1a1c22;
    --label-vision: #5fd4b8;
    --label-speech: #e6c478;
    --label-speaker: #c894d6;
    --label-face: #85d690;
    --label-memory: #7fb3e6;
    --label-reply: #f0d8a8;
    --label-voice: #e6889a;
    --label-system: #8e94a3;
    --label-ghost: #9b8fbe;
    --look-engage: #6f6;
    --look-track: #ddc070;
    --look-scan: #8e94a3;
    --look-idle: #4a4f59;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  body { display: flex; flex-direction: column; padding: 22px 30px; gap: 18px;
    overflow: hidden; }

  header { display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--rule); padding-bottom: 10px; }
  header h1 { font-weight: 200; letter-spacing: 0.2em; font-size: 14px;
    color: var(--dim); text-transform: uppercase; }
  header .nav { font-size: 11px; color: var(--dim); }
  header .nav a { color: var(--label-memory); text-decoration: none; margin-left: 14px; }
  header .pills { display: flex; gap: 8px; font: 10px ui-monospace, "SF Mono", Consolas, monospace; }
  header .pill { padding: 2px 8px; border-radius: 8px; background: #11141b;
    border: 1px solid var(--rule); color: var(--dim); }
  header .pill.up { color: #6f6; border-color: #2a4a2a; }
  header .pill.down { color: #f66; border-color: #4a2a2a; }

  /* Camera stage with face-box overlay + look-at badge */
  #stage { position: relative; width: 100%; aspect-ratio: 16 / 9;
    max-height: 50vh; background: #000; border: 1px solid var(--rule);
    border-radius: 4px; overflow: hidden; }
  #cam { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; background: #000; }
  #cam.disconnected { filter: grayscale(1) opacity(0.4); }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; }
  /* Face bbox color states (2026-05-11):
       known     -> green (matched in streamerpi face_db)
       candidate -> yellow, dashed (unknown but clear capture, conf > 0.85)
       unknown   -> red, dashed (unknown and conf <= 0.85)
     Yellow signals "appropriate for processing" — face captured cleanly,
     waiting on auto-enrollment / name resolution. */
  #overlay rect.face { fill: none; stroke: var(--label-face); stroke-width: 2;
    vector-effect: non-scaling-stroke; }
  #overlay rect.face.candidate { stroke: #ddc070; stroke-dasharray: 6 3; }
  #overlay rect.face.unknown { stroke: #e94560; stroke-dasharray: 4 3; }
  #overlay text.face-label { font: 14px ui-monospace, "SF Mono", Consolas, monospace;
    fill: var(--label-face); paint-order: stroke; stroke: rgba(0,0,0,0.7);
    stroke-width: 3; stroke-linejoin: round; }
  #overlay text.face-label.candidate { fill: #ddc070; }
  #overlay text.face-label.unknown   { fill: #e94560; }
  #lookat { position: absolute; top: 12px; right: 14px;
    font: 11px/1 ui-monospace, "SF Mono", Consolas, monospace;
    letter-spacing: 0.05em; padding: 6px 10px; border-radius: 14px;
    background: rgba(7,8,10,0.78); border: 1px solid var(--rule);
    color: var(--look-idle); display: flex; align-items: center; gap: 6px; }
  #lookat .dot { width: 7px; height: 7px; border-radius: 50%;
    background: var(--look-idle); }
  #lookat.engage { color: var(--look-engage); border-color: #2a4a2a; }
  #lookat.engage .dot { background: var(--look-engage); box-shadow: 0 0 6px var(--look-engage); }
  #lookat.track  { color: var(--look-track);  border-color: #4a4128; }
  #lookat.track  .dot { background: var(--look-track); }
  #lookat.scan   { color: var(--look-scan); }
  #lookat.scan   .dot { background: var(--look-scan); }
  #cam-status { position: absolute; bottom: 10px; left: 12px;
    font: 10px/1 ui-monospace, monospace; color: var(--dim);
    background: rgba(7,8,10,0.78); padding: 4px 8px; border-radius: 10px; }
  #rec-indicator { position: absolute; top: 12px; left: 14px;
    display: flex; align-items: center; gap: 6px;
    font: bold 11px/1 ui-monospace, monospace; color: #f85149;
    background: rgba(7,8,10,0.78); padding: 5px 9px; border-radius: 10px;
    letter-spacing: 0.08em; }
  #rec-indicator.hidden { display: none; }
  #rec-indicator .rec-dot { width: 8px; height: 8px; border-radius: 50%;
    background: #f85149; animation: rec-pulse 1.2s ease-in-out infinite; }
  @keyframes rec-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  /* Scene caption: persistent, top-left under the camera */
  #scene { padding: 4px 0 4px 0; }
  #scene .label { font: 10px/1 ui-monospace, "SF Mono", Consolas, monospace;
    letter-spacing: 0.1em; color: var(--label-vision); margin-bottom: 6px; }
  #scene .text { font-size: 22px; line-height: 1.3; font-weight: 250;
    letter-spacing: -0.005em; color: var(--fg); min-height: 56px; }
  #scene .text.empty { color: var(--dim); font-style: italic; font-weight: 300; }

  /* Ghost reasoning panel: low-contrast italic typewriter from Qwen3.6
     thinking-on (memory extraction + summary rollup). Aesthetic: visitor
     glimpses Timmy's actual thought process from real production work. */
  #ghost { padding: 6px 0; border-top: 1px solid var(--rule);
    min-height: 64px; max-height: 110px; overflow: hidden; }
  #ghost .label { font: 10px/1 ui-monospace, monospace; letter-spacing: 0.1em;
    color: var(--label-ghost); margin-bottom: 6px; opacity: 0.85; }
  #ghost .label .src { color: var(--dim); margin-left: 6px; font-size: 9px; }
  #ghost .text { font: 300 13px/1.45 ui-monospace, "SF Mono", Consolas, monospace;
    color: var(--label-ghost); opacity: 0.55; font-style: italic;
    transition: opacity 1.2s ease-out; max-height: 80px; overflow: hidden; }
  #ghost .text.idle { color: var(--dim); opacity: 0.45; }
  #ghost .text.fading { opacity: 0.18; }
  #ghost .cursor { display: inline-block; width: 5px; height: 12px;
    background: var(--label-ghost); margin-left: 3px; vertical-align: -2px;
    opacity: 0.6; animation: blink 1s steps(2) infinite; }
  #ghost .cursor.gone { display: none; }

  /* Live reply panel: anchored slot, typewriter */
  #reply { padding: 6px 0; border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule); min-height: 80px; }
  #reply .label { font: 10px/1 ui-monospace, monospace; letter-spacing: 0.1em;
    color: var(--label-reply); margin-bottom: 6px; }
  #reply .text { font-size: 18px; line-height: 1.4; color: var(--fg);
    font-weight: 300; min-height: 50px; }
  #reply .text.idle { color: var(--dim); font-style: italic; font-weight: 300; }
  #reply .cursor { display: inline-block; width: 7px; height: 18px;
    background: var(--label-reply); margin-left: 4px; vertical-align: -3px;
    animation: blink 1s steps(2) infinite; }
  #reply .cursor.gone { display: none; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Audit log: scrolling, newest on top */
  #audit { flex: 1; overflow: hidden; font: 12px/1.55 ui-monospace,
    "SF Mono", Consolas, monospace; }
  #audit .row { display: grid; grid-template-columns: 60px 200px 1fr;
    column-gap: 12px; padding: 1px 0; align-items: baseline;
    animation: fadeIn 0.4s ease-out; }
  #audit .ts { color: var(--dim); font-size: 10px; }
  #audit .lbl { font-size: 10px; letter-spacing: 0.05em; }
  #audit .body { color: var(--fg); }
  #audit .lbl.vision   { color: var(--label-vision);  }
  #audit .lbl.speech   { color: var(--label-speech);  }
  #audit .lbl.speaker  { color: var(--label-speaker); }
  /* speaker-unknown variant: amber + bold so unknown_N attributions are
     immediately visible to the operator (Supervisor H9). */
  #audit .lbl.speaker-unknown { color: #f0883e; font-weight: 700; }
  #audit .lbl.face     { color: var(--label-face);    }
  #audit .lbl.memory   { color: var(--label-memory);  }
  #audit .lbl.reply    { color: var(--label-reply);   }
  #audit .lbl.voice    { color: var(--label-voice);   }
  #audit .lbl.system   { color: var(--label-system);  }
  #audit .lbl.ghost    { color: var(--label-ghost);   }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } }
</style>
</head>
<body>

<header>
  <h1>Little Timmy &middot; Visitor</h1>
  <div class="pills">
    <span id="lt-pill" class="pill">lt ?</span>
    <span id="pi-pill" class="pill">streamerpi ?</span>
    <span id="rtc-pill" class="pill">webrtc ?</span>
  </div>
  <div class="nav"><a href="/operator">operator</a><a href="/health">health</a></div>
</header>

<section id="stage">
  <video id="cam" autoplay playsinline muted class="disconnected"></video>
  <svg id="overlay" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="lookat"><span class="dot"></span><span id="lookat-text">idle</span></div>
  <div id="cam-status">connecting&hellip;</div>
  <div id="rec-indicator" class="hidden">
    <span class="rec-dot"></span><span>REC</span>
  </div>
</section>

<section id="scene">
  <div class="label">[ VISION / Qwen3.6:8084 ]</div>
  <div id="scene-text" class="text empty">no scene captured yet</div>
</section>

<section id="ghost">
  <div class="label">[ THINKING / Qwen3.6:8083 ]<span class="src" id="ghost-src"></span></div>
  <div id="ghost-text" class="text idle">…</div>
</section>

<section id="reply">
  <div class="label">[ REPLY / Llama-3.2-3B ]</div>
  <div id="reply-text" class="text idle">idle</div>
</section>

<section id="audit"></section>

<script>
  const scene_text = document.getElementById('scene-text');
  const reply_text = document.getElementById('reply-text');
  const audit = document.getElementById('audit');
  const lt_pill = document.getElementById('lt-pill');
  const pi_pill = document.getElementById('pi-pill');
  const rtc_pill = document.getElementById('rtc-pill');
  const cam = document.getElementById('cam');
  const overlay = document.getElementById('overlay');
  const lookat = document.getElementById('lookat');
  const lookat_text = document.getElementById('lookat-text');
  const cam_status = document.getElementById('cam-status');
  const ghost_text = document.getElementById('ghost-text');
  const ghost_src = document.getElementById('ghost-src');

  const MAX_AUDIT = 18;
  const FACE_LOG_INTERVAL_MS = 30_000;
  // Clear face overlays if no fresh /faces update has arrived in this window.
  // Prevents stale "phantom Dan box floating in air" when face tracking is
  // toggled off or the WS stalls — symptom Dan reported 2026-05-11 23:02.
  const FACE_STALE_MS = 2000;

  // ----- state for incremental rendering -----
  let lastSceneText = null;
  let lastFaceLogged = new Map();
  let activeReply = null;
  let overlayViewBox = '0 0 640 360';
  let lastFacesByKey = new Map();   // bbox dedupe so we don't redraw on every tick
  let lastFacesUpdate = 0;          // ts of last handleFaces(); used by stale-overlay sweep

  // ----- session recording (Supervisor M6) -----
  // booth-display broadcasts recording_start/recording_stop on the existing
  // /ws fanout when LT-OS toggles recording. We hook MediaRecorder onto the
  // already-attached WebRTC <video> srcObject and POST 2s webm chunks back.
  let mediaRecorder = null;
  let mediaRecorderSessionId = null;
  const REC_CHUNK_MS = 2000;

  // ----- helpers -----
  function fmtTime(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  function setPill(el, label, up) {
    el.textContent = `${label} ${up ? 'up' : 'down'}`;
    el.className = 'pill ' + (up ? 'up' : 'down');
  }
  function appendAudit(kind, source, text) {
    const row = document.createElement('div');
    row.className = 'row';
    const tsEl = document.createElement('span'); tsEl.className = 'ts';
    tsEl.textContent = fmtTime(new Date());
    const lblEl = document.createElement('span'); lblEl.className = `lbl ${kind}`;
    lblEl.textContent = source ? `[${kind.toUpperCase()}/${source}]` : `[${kind.toUpperCase()}]`;
    const bodyEl = document.createElement('span'); bodyEl.className = 'body';
    bodyEl.textContent = text;
    row.append(tsEl, lblEl, bodyEl);
    audit.prepend(row);
    while (audit.children.length > MAX_AUDIT) audit.removeChild(audit.lastChild);
  }

  // ----- WebRTC client (one peer, recvonly video, retries forever) -----
  // ICE 'disconnected' is recoverable per W3C: a single missed keepalive
  // can flip the state to 'disconnected' and back to 'connected' without
  // needing a new offer. The earlier version treated 'disconnected' as
  // terminal and reissued offers every ~10 s — streamerpi's single-client
  // lock then superseded the previous peer on each offer, causing the
  // visitor's video to gray and restart in a tight loop. Hold 'disconnected'
  // for DISCONNECT_GRACE_MS before tearing down so transient flicker can
  // recover in place. Capture the pc in the handler closure so a stale
  // event from a closed pc can't restart the new one.
  let pc = null;
  let disconnectGraceTimer = null;
  const DISCONNECT_GRACE_MS = 5000;

  async function startWebRTC() {
    cam_status.textContent = 'negotiating…';
    rtc_pill.className = 'pill';
    rtc_pill.textContent = 'webrtc neg';
    if (disconnectGraceTimer) {
      clearTimeout(disconnectGraceTimer);
      disconnectGraceTimer = null;
    }
    if (pc) { try { pc.close(); } catch {} pc = null; }
    const thisPc = new RTCPeerConnection();
    pc = thisPc;
    thisPc.addTransceiver('video', { direction: 'recvonly' });
    thisPc.ontrack = (e) => {
      cam.srcObject = e.streams[0];
      cam.classList.remove('disconnected');
      cam_status.textContent = '';
    };
    thisPc.onconnectionstatechange = () => {
      // Ignore handlers from a pc that has already been replaced.
      if (pc !== thisPc) return;
      const st = thisPc.connectionState;
      setPill(rtc_pill, 'webrtc', st === 'connected');
      // Any state change clears a pending grace timer.
      if (disconnectGraceTimer) {
        clearTimeout(disconnectGraceTimer);
        disconnectGraceTimer = null;
      }
      if (st === 'connected') {
        cam.classList.remove('disconnected');
        cam_status.textContent = '';
        return;
      }
      if (st === 'failed' || st === 'closed') {
        cam.classList.add('disconnected');
        cam_status.textContent = `webrtc ${st}, retrying…`;
        setTimeout(startWebRTC, 3000);
        return;
      }
      if (st === 'disconnected') {
        // Transient flicker — hold for grace window before treating as a real
        // failure. Don't gray out yet; ICE may recover in place.
        cam_status.textContent = `webrtc flicker, holding ${DISCONNECT_GRACE_MS/1000}s…`;
        disconnectGraceTimer = setTimeout(() => {
          disconnectGraceTimer = null;
          if (pc === thisPc && thisPc.connectionState === 'disconnected') {
            cam.classList.add('disconnected');
            cam_status.textContent = 'webrtc still disconnected, retrying…';
            startWebRTC();
          }
        }, DISCONNECT_GRACE_MS);
      }
    };
    try {
      const offer = await thisPc.createOffer();
      await thisPc.setLocalDescription(offer);
      // Non-trickle: wait until ICE gathering is complete before posting.
      await new Promise((res) => {
        if (thisPc.iceGatheringState === 'complete') return res();
        const onChange = () => {
          if (thisPc.iceGatheringState === 'complete') {
            thisPc.removeEventListener('icegatheringstatechange', onChange);
            res();
          }
        };
        thisPc.addEventListener('icegatheringstatechange', onChange);
        // Safety timeout in case gathering stalls.
        setTimeout(res, 4000);
      });
      // Abort if this pc was already replaced by a newer startWebRTC call.
      if (pc !== thisPc) return;
      const r = await fetch('/streamerpi/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sdp: thisPc.localDescription.sdp,
          type: thisPc.localDescription.type,
        }),
      });
      if (!r.ok) throw new Error('offer http ' + r.status);
      const answer = await r.json();
      if (pc !== thisPc) return;
      await thisPc.setRemoteDescription(answer);
      appendAudit('system', 'webrtc', `peer offer accepted (${answer.type})`);
    } catch (e) {
      if (pc !== thisPc) return;  // stale path
      appendAudit('system', 'webrtc', `negotiation failed: ${e.message}, retrying…`);
      cam.classList.add('disconnected');
      cam_status.textContent = 'webrtc retry in 3s';
      setTimeout(startWebRTC, 3000);
    }
  }

  // ----- handlers per event type -----
  function handleVision(d) {
    if (!d || !d.record) return;
    const scene = (d.record.scene_state || '').trim();
    if (!scene) return;
    if (scene !== lastSceneText) {
      const arrow = lastSceneText ? '→ ' : '';
      scene_text.classList.remove('empty');
      scene_text.textContent = scene;
      appendAudit('vision', 'Qwen3.6:8084', arrow + scene);
      lastSceneText = scene;
    }
  }

  function handleFaces(d) {
    if (!d) return;
    lastFacesUpdate = Date.now();
    const faces = Array.isArray(d.faces) ? d.faces : [];
    // Update SVG viewBox to match source image dimensions.
    if (Array.isArray(d.image_size) && d.image_size.length === 2) {
      const [w, h] = d.image_size;
      const vb = `0 0 ${w} ${h}`;
      if (vb !== overlayViewBox) {
        overlay.setAttribute('viewBox', vb);
        overlayViewBox = vb;
      }
    }
    // Redraw face rects + labels.
    while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
    const ns = 'http://www.w3.org/2000/svg';
    // Bbox color state classification (2026-05-11):
    //   known     -> green (face_db match)
    //   candidate -> yellow (no match yet but conf > FACE_CAND_CONF)
    //   unknown   -> red (no match, low capture confidence)
    const FACE_CAND_CONF = 0.85;
    for (const f of faces) {
      if (!Array.isArray(f.bbox) || f.bbox.length !== 4) continue;
      const [x, y, w, h] = f.bbox;
      const known = f.name && f.name !== 'unknown';
      const conf = typeof f.confidence === 'number' ? f.confidence : 0;
      const state = known ? 'known' : (conf > FACE_CAND_CONF ? 'candidate' : 'unknown');
      const r = document.createElementNS(ns, 'rect');
      r.setAttribute('x', x); r.setAttribute('y', y);
      r.setAttribute('width', w); r.setAttribute('height', h);
      r.setAttribute('class', state === 'known' ? 'face' : 'face ' + state);
      overlay.appendChild(r);
      const t = document.createElementNS(ns, 'text');
      t.setAttribute('x', x + 4);
      t.setAttribute('y', Math.max(14, y - 4));
      t.setAttribute('class', state === 'known' ? 'face-label' : 'face-label ' + state);
      const confStr = conf > 0 ? ` ${conf.toFixed(2)}` : '';
      const labelName = state === 'candidate' ? 'candidate' : (known ? f.name : 'unknown');
      t.textContent = labelName + confStr;
      overlay.appendChild(t);
    }
    // Audit log: only when a NEW known face appears (rate-limited).
    const now = Date.now();
    for (const f of faces) {
      const name = f.name && f.name !== 'unknown' ? f.name : null;
      if (!name) continue;
      const last = lastFaceLogged.get(name) || 0;
      if (now - last < FACE_LOG_INTERVAL_MS) continue;
      lastFaceLogged.set(name, now);
      const conf = (typeof f.confidence === 'number') ? f.confidence.toFixed(2) : '?';
      appendAudit('face', 'streamerpi', `matched ${name} (${conf})`);
    }
  }

  function handleBehavior(d) {
    if (!d) return;
    const mode = (d.mode || 'idle').toLowerCase();
    const visible = !!d.face_visible;
    const cls = (mode === 'engage') ? 'engage'
              : (mode === 'track')  ? 'track'
              : (mode === 'scan')   ? 'scan'
              : '';
    lookat.className = cls;
    const text =
      mode === 'engage' ? 'looking at someone'
    : mode === 'track'  ? (visible ? 'tracking' : 'tracking (lost)')
    : mode === 'scan'   ? (visible ? 'scanning (face seen)' : 'scanning')
    : 'idle';
    lookat_text.textContent = text;
  }

  function startLiveReply() {
    if (activeReply) return;
    reply_text.classList.remove('idle');
    reply_text.innerHTML = '<span class="body"></span><span class="cursor"></span>';
    activeReply = { accum: '', startTs: performance.now(),
                     bodyEl: reply_text.querySelector('.body'),
                     cursorEl: reply_text.querySelector('.cursor') };
  }
  function endLiveReply(durMs) {
    if (!activeReply) return;
    const d = (durMs / 1000).toFixed(1);
    const tokens = activeReply.accum ? activeReply.accum.length : 0;
    activeReply.cursorEl?.classList.add('gone');
    appendAudit('reply', 'Llama-3.2-3B', `complete (${d}s, ~${tokens} chars)`);
    activeReply = null;
  }

  function handleTurn(m) {
    if (m.role === 'user') {
      const utterance = (m.content || '').trim();
      if (utterance) appendAudit('speech', 'Whisper',
        `heard "${utterance.length > 100 ? utterance.slice(0,97)+'…' : utterance}"`);
      if (m.speaker) {
        // Differentiate known vs unknown_N attribution so the operator
        // sees mis-classification at a glance (Supervisor H9).
        const isUnknownSpeaker = m.speaker.toLowerCase().startsWith('unknown');
        appendAudit(isUnknownSpeaker ? 'speaker-unknown' : 'speaker', 'speaker-id', m.speaker);
      }
      startLiveReply();
    } else if (m.role === 'assistant') {
      const dur = activeReply ? performance.now() - activeReply.startTs : 0;
      endLiveReply(dur);
    }
  }

  function handleRetrieval(m) {
    const memN = (m.memories || []).length;
    const factN = (m.facts || []).length;
    appendAudit('memory', 'postgres', `retrieved ${memN} memor${memN===1?'y':'ies'}, ${factN} fact${factN===1?'':'s'}`);
  }

  function handleToken(content) {
    if (!activeReply) startLiveReply();
    activeReply.accum += content;
    activeReply.bodyEl.textContent = activeReply.accum;
  }

  function handleMetrics(m) {
    if (typeof m.tts_ms === 'number' && m.tts_ms > 0) {
      appendAudit('voice', 'Piper', `synthesized in ${(m.tts_ms/1000).toFixed(1)}s`);
    }
  }

  // ----- ghost reasoning panel -----
  // Each Qwen3.6 thinking-on completion (memory extraction or summary
  // rollup) arrives as one event with the full reasoning_content blob.
  // Type it out at ~33 chars/sec, cap to GHOST_MAX_CHARS, fade to dim
  // after GHOST_FADE_MS of inactivity. New event interrupts and resets.
  const GHOST_TYPE_INTERVAL_MS = 30;
  const GHOST_MAX_CHARS = 700;
  const GHOST_FADE_MS = 6000;
  let ghostTypeTimer = null;
  let ghostFadeTimer = null;

  function handleReasoning(source, reasoning) {
    if (!reasoning) return;
    if (ghostTypeTimer) { clearInterval(ghostTypeTimer); ghostTypeTimer = null; }
    if (ghostFadeTimer) { clearTimeout(ghostFadeTimer); ghostFadeTimer = null; }
    const text = reasoning.length > GHOST_MAX_CHARS
      ? reasoning.slice(0, GHOST_MAX_CHARS - 1) + '…'
      : reasoning;
    ghost_text.classList.remove('idle', 'fading');
    ghost_src.textContent = source ? `· ${source}` : '';
    ghost_text.innerHTML = '<span class="body"></span><span class="cursor"></span>';
    const bodyEl = ghost_text.querySelector('.body');
    const cursorEl = ghost_text.querySelector('.cursor');
    let i = 0;
    ghostTypeTimer = setInterval(() => {
      if (i >= text.length) {
        clearInterval(ghostTypeTimer);
        ghostTypeTimer = null;
        cursorEl.classList.add('gone');
        ghostFadeTimer = setTimeout(() => {
          ghost_text.classList.add('fading');
        }, GHOST_FADE_MS);
        appendAudit('ghost', `Qwen3.6:8083/${source}`,
          `reasoned (${reasoning.length} chars)`);
        return;
      }
      // Append in chunks of ~3 chars per tick to feel like thought, not typing.
      const next = text.slice(i, Math.min(i + 3, text.length));
      bodyEl.textContent += next;
      i += next.length;
    }, GHOST_TYPE_INTERVAL_MS);
  }

  // ----- session recording handlers -----
  function pickRecorderMimeType() {
    const candidates = [
      'video/webm; codecs=vp9',
      'video/webm; codecs=vp8',
      'video/webm',
    ];
    if (typeof MediaRecorder === 'undefined' ||
        typeof MediaRecorder.isTypeSupported !== 'function') return '';
    for (const c of candidates) {
      if (MediaRecorder.isTypeSupported(c)) return c;
    }
    return '';
  }
  function handleRecordingStart(sessionId) {
    if (mediaRecorder) {
      appendAudit('rec', 'visitor', 'already recording, ignoring start');
      return;
    }
    const stream = cam.srcObject;
    if (!stream) {
      appendAudit('rec', 'visitor', 'no WebRTC stream yet — cannot record');
      return;
    }
    let mimeType = pickRecorderMimeType();
    try {
      mediaRecorder = mimeType
        ? new MediaRecorder(stream, { mimeType })
        : new MediaRecorder(stream);
    } catch (e) {
      appendAudit('rec', 'visitor', 'MediaRecorder ctor failed: ' + (e && e.message));
      mediaRecorder = null;
      return;
    }
    mediaRecorderSessionId = sessionId;
    mediaRecorder.ondataavailable = async (e) => {
      if (!e.data || !e.data.size) return;
      try {
        await fetch('/api/recording/chunk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: e.data,
        });
      } catch (err) {
        appendAudit('rec', 'visitor', 'chunk upload failed: ' + (err && err.message));
      }
    };
    mediaRecorder.onerror = (ev) => {
      appendAudit('rec', 'visitor', 'recorder error: ' + (ev.error && ev.error.name));
    };
    mediaRecorder.onstop = () => {
      mediaRecorder = null;
      mediaRecorderSessionId = null;
      document.getElementById('rec-indicator')?.classList.add('hidden');
      appendAudit('rec', 'visitor', 'recorder stopped');
    };
    try {
      mediaRecorder.start(REC_CHUNK_MS);
    } catch (e) {
      appendAudit('rec', 'visitor', 'recorder start failed: ' + (e && e.message));
      mediaRecorder = null;
      mediaRecorderSessionId = null;
      return;
    }
    document.getElementById('rec-indicator')?.classList.remove('hidden');
    appendAudit('rec', 'visitor', `recording ${sessionId} (${mimeType || 'browser default'})`);
  }
  function handleRecordingStop() {
    if (!mediaRecorder) {
      appendAudit('rec', 'visitor', 'stop received but not recording');
      return;
    }
    try { mediaRecorder.stop(); } catch { /* onstop will clear state */ }
  }

  // ----- WS connection -----
  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => appendAudit('system', 'booth-display', 'connected');
    ws.onclose = () => {
      appendAudit('system', 'booth-display', 'reconnecting…');
      setTimeout(connect, 1500);
    };
    ws.onmessage = (e) => {
      let m; try { m = JSON.parse(e.data); } catch { return; }
      switch (m.type) {
        case 'snapshot':
          setPill(lt_pill, 'lt', m.lt_ws_up);
          setPill(pi_pill, 'streamerpi', m.streamerpi_up);
          if (m.vision) handleVision(m.vision);
          if (m.faces) handleFaces(m.faces);
          if (m.behavior) handleBehavior(m.behavior);
          break;
        case 'vision':   handleVision(m.data); break;
        case 'faces':    handleFaces(m.data); break;
        case 'behavior': handleBehavior(m.data); break;
        case 'lt_turn':  handleTurn(m); break;
        case 'lt_retrieval': handleRetrieval(m); break;
        case 'lt_token': handleToken(m.content); break;
        case 'lt_metrics': handleMetrics(m); break;
        case 'lt_reasoning': handleReasoning(m.source, m.reasoning); break;
        case 'recording_start': handleRecordingStart(m.session_id); break;
        case 'recording_stop':  handleRecordingStop(); break;
      }
    };
  }
  // Staleness sweep: if no /faces event has arrived in FACE_STALE_MS, clear
  // any rendered overlay so the visitor never sees a phantom box floating
  // in the air after detections have stopped (face-tracking-off, WS stall,
  // streamerpi reboot, etc.). Cheap: runs once per second.
  function sweepStaleFaceOverlay() {
    if (!lastFacesUpdate) return;
    if (Date.now() - lastFacesUpdate < FACE_STALE_MS) return;
    if (!overlay || overlay.childElementCount === 0) return;
    while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
  }
  setInterval(sweepStaleFaceOverlay, 1000);

  connect();
  startWebRTC();
</script>
</body>
